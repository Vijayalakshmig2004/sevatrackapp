name: Selenium E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Node dependencies
      run: npm ci || npm install

    - name: Build Next.js app
      run: npm run build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium openpyxl pandas

    - name: Start Server, Wait, and Run Selenium Tests
      env:
        SEVATRACK_HEADLESS: true
        SEVATRACK_BASE_URL: http://localhost:3000
      run: |
        npm run start &
        npx --yes wait-on http://localhost:3000
        python tests/e2e_sevatrack.py || true
        python tests/generate_excel_report.py || true

    - name: Upload Selenium Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: selenium-test-reports
        path: |
          E2E_Test_Report_SevaTrack_*.csv
          tests/SevaTrack_Test_Report_*.xlsx
        retention-days: 14
