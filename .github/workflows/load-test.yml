name: Load Performance Workflow
run-name: Load Performance Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  load-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Load Scenarios (Web & Android)
      run: python tests/load_performance_test.py

    - name: Upload Load Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: load-test-reports
        path: tests/Load_Performance_Report_*.xlsx
        retention-days: 14
