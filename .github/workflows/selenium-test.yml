name: Selenium E2E Workflow
run-name: Selenium Web Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Selenium Test Scenarios
      run: python tests/selenium_e2e_test.py

    - name: Upload Selenium Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: selenium-test-reports
        path: tests/Selenium_E2E_Report_*.xlsx
        retention-days: 14
