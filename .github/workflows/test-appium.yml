name: Appium Workflow
run-name: Appium Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  appium-tests:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client selenium pandas openpyxl

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install and Start Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2
        appium --log-level error &
        sleep 5

    - name: Run Appium Tests in Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 33
        target: google_apis
        arch: x86_64
        profile: pixel_6
        script: python tests/adaptive_appium_test.py

    - name: Upload Appium Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: appium-test-report
        path: tests/appium_test_report.xlsx
        retention-days: 14
