name: Appium Mobile Workflow
run-name: Appium Mobile Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Appium Mobile Scenarios
      run: python tests/appium_mobile_test.py

    - name: Upload Appium Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: appium-test-reports
        path: tests/Appium_Mobile_Report_*.xlsx
        retention-days: 14
