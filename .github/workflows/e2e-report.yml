name: Test Suite & Reports

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Node dependencies
      run: npm ci || npm install

    - name: Build Next.js app
      run: npm run build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium openpyxl pandas

    - name: Start Server, Wait, and Run E2E Tests
      env:
        SEVATRACK_HEADLESS: true
        SEVATRACK_BASE_URL: http://localhost:3000
      run: |
        npm run start &
        npx --yes wait-on http://localhost:3000
        python tests/e2e_sevatrack.py || true

    - name: Generate Main Excel Report
      run: python tests/generate_excel_report.py || true

    - name: Run Vulnerability Tests (DAST)
      run: |
        python automated_test/dast.py || true
        python automated_test/generate_excel.py || true

    - name: Upload Web Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: web-test-reports
        path: |
          E2E_Test_Report_SevaTrack_*.csv
          tests/SevaTrack_Test_Report_*.xlsx
          automated_test/DAST_Report_Updated.xlsx
        retention-days: 14

  appium-tests:
    runs-on: macos-13
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client selenium openpyxl pandas

    - name: Install Appium
      run: npm install -g appium

    - name: Install UiAutomator2 Driver
      run: appium driver install uiautomator2

    - name: Run Appium Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: |
          appium &
          sleep 10
          python tests/adaptive_appium_test.py || true

    - name: Upload Appium Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: appium-test-report
        path: tests/appium_test_report.xlsx
        retention-days: 14
